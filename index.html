                    div.innerHTML = `
    <div style="display:flex; justify-content:space-between; align-items:flex-start;">
        <div style="font-weight:bold; font-size:15px; color:#333;">${job.name}</div>
        <div>
            <button class="mini-btn" onclick="openJobModal(${job.id})" style="padding:6px 10px; margin-right:5px; border-radius:5px;">✏️</button>
            <button class="mini-btn" onclick="hardDeleteJob(${job.id})" style="padding:6px 10px; background:#ffebee; color:#c62828; border-radius:5px;">×</button>
        </div>
    </div>
    
    <div style="width:100%; height:12px; background:#eee; border-radius:6px; margin-top:10px; overflow:hidden; position:relative;">
        <div style="width:${job.progress}%; height:100%; background:linear-gradient(90deg, #81c784, #4caf50); transition: width 0.5s ease-in-out;"></div>
    </div>
    
    <div style="display:flex; justify-content:space-between; font-size:11px; color:#666; margin-top:5px;">
        <span>想定: ${job.totalH}h</span>
        <span style="font-weight:bold; color:#2e7d32;">${job.progress}% 完了</span>
    </div>
    <div style="font-size:11px; color:#999;">期間: ${job.start} ～ ${job.end}</div>
`;
                    container.appendChild(div);
                });
                // モーダルを開く処理のどこかに1行追加
                document.querySelectorAll('.side-nav').forEach(el => el.style.display = 'none');
                document.getElementById('job-list-modal-overlay').style.display = 'flex';
            }

            // 履歴から完全に削除
            function hardDeleteJob(id) {
                toggleTimelineUI(false);
                const targetId = Number(id);
                // 削除対象の案件名を特定する
                const targetJob = appData.longTermJobs.find(j => Number(j.id) === targetId);
                if (!targetJob) return;
                const targetName = targetJob.name; // 消すべき名前（例：「A案件」）

                if (confirm(`「${targetName}」を履歴とタイムラインから完全に削除しますか？`)) {
                    // 1. 案件リストから削除
                    appData.longTermJobs = appData.longTermJobs.filter(j => Number(j.id) !== targetId);

                    // 2. 全日程の予定を「名前」でスキャンして削除
                    if (appData.tasks) {
                        Object.keys(appData.tasks).forEach(date => {
                            appData.tasks[date] = appData.tasks[date].filter(task => {
                                // 名前が一致するものを消去（完全に一致しないものだけ残す）
                                return task.name !== targetName;
                            });
                        });
                    }

                    saveData();
                    openJobList();
                    renderCalendar();
                    renderTimeline();
                }
            }


            function getUpcomingJobs() {
                const today = new Date();
                today.setHours(0, 0, 0, 0);

                // 3日後の日付
                const threeDaysLater = new Date(today);
                threeDaysLater.setDate(today.getDate() + 3);

                // 条件に合う案件を抽出
                return (appData.longTermJobs || []).filter(j => {
                    const dueDate = new Date(j.end);
                    // 削除・完了されておらず、かつ「今日〜3日後」が締切のもの
                    return !j.isDeleted && !j.isCompleted && dueDate >= today && dueDate <= threeDaysLater;
                });
            }

            function toggleHandedness() {
                appData.settings.handleSide = (appData.settings.handleSide === 'right') ? 'left' : 'right';
                saveData();
                renderTimeline(); // タイムラインを再描画して反映
            }

            function sendJobNotification() {
                const now = new Date();
                // 日本時間の YYYY-MM-DD を確実に取得
                const y = now.getFullYear();
                const m = String(now.getMonth() + 1).padStart(2, '0');
                const d = String(now.getDate()).padStart(2, '0');
                const todayStr = `${y}-${m}-${d}`; // "2026-02-25" 形式

                const todayTime = new Date(y, now.getMonth(), now.getDate()).getTime();
                const threeDaysLaterTime = todayTime + (3 * 24 * 60 * 60 * 1000);

                let upcomingJobs = (appData.longTermJobs || []).filter(j => {
                    // スラッシュをハイフンに置換して統一
                    const formattedEnd = j.end.replace(/\//g, '-');
                    const dueDate = new Date(formattedEnd);
                    const dueTime = dueDate.getTime();

                    return !j.isDeleted && !j.isCompleted && dueTime >= todayTime && dueTime <= threeDaysLaterTime;
                });

                if (upcomingJobs.length === 0) return;

                upcomingJobs.sort((a, b) => new Date(a.end.replace(/\//g, '-')) - new Date(b.end.replace(/\//g, '-')));

                // 1. メッセージ作成
                let title = upcomingJobs.length === 1 ? "📢 締切間近の案件" : `📢 締切間近が ${upcomingJobs.length} 件あります`;

                // 2. 各案件の表示スタイルを設定
                let bodyHtml = upcomingJobs.map(j => {
                    // 形式を統一して比較
                    const jobEnd = j.end.replace(/\//g, '-');
                    const isToday = (jobEnd === todayStr);

                    if (isToday) {
                        // ★ ここで色と太さを指定
                        return `<div style="color: #ff4d4d !important; font-weight: 900 !important; margin-bottom: 6px;">・${j.name} (本日締切！)</div>`;
                    } else {
                        return `<div style="margin-bottom: 4px; color: #ffffff;">・${j.name} (${j.end})</div>`;
                    }
                }).join('');

                // 3. 画面に表示
                const bar = document.getElementById('app-notice-bar');
                const titleEl = document.getElementById('notice-title');
                const bodyEl = document.getElementById('notice-body');

                titleEl.innerText = title;
                bodyEl.innerHTML = bodyHtml; // innerHTMLを使う

                bar.style.display = 'block';
                bar.onclick = () => { bar.style.display = 'none'; };
                setTimeout(() => { bar.style.display = 'none'; }, 10000);
            }

            // アプリの初期化
            function init() {
                loadData();
                renderCalendar();
                fetchHolidays();

                // ★ ここから追記：通知の初期設定と実行
                if (window.Notification) {
                    if (Notification.permission === "default") {
                        Notification.requestPermission();
                    }
                    // アプリ起動時に締切をチェックして通知を出す
                    sendJobNotification();
                }
                // ★ ここまで追記

                const dayScreen = document.getElementById('day-screen');
                dayScreen.addEventListener('touchstart', (e) => {
                    if (document.getElementById('job-list-modal-overlay').style.display === 'flex') return;
                    touchStartX = e.touches[0].pageX;
                }, { passive: true });

                dayScreen.addEventListener('touchend', (e) => {
                    // もし触ったのが「スライダー」だったら、スワイプ処理を即終了する
                    if (e.target.type === 'range') {
                        return;
                    }
                    // ★ここを追加：タスク操作中なら日付を切り替えない！
                    if (isDraggingTask) return;
                    const touchEndX = e.changedTouches[0].pageX;
                    const diff = touchStartX - touchEndX;
                    if (diff > 100) slideDay(1);
                    else if (diff < -100) slideDay(-1);
                }, { passive: true });

                document.getElementById('final-delete-btn').onclick = deleteTask;
                document.getElementById('month-reset-btn').onclick = (e) => {
                    e.stopPropagation();
                    const y = currentViewDate.getFullYear(), m = currentViewDate.getMonth() + 1;
                    document.getElementById('reset-confirm-msg').textContent = `${y}年${m}月の「予定」と「シフト」をすべて削除します。よろしいですか？`;
                    document.getElementById('reset-modal-overlay').style.display = 'flex';
                };

                // init関数の中にこれを追加
                document.body.addEventListener('click', () => {
                    sendJobNotification();
                }, { once: true }); // 最初の一回だけ実行

                const cp = document.getElementById('color-picker-area');
                if (cp) {
                    cp.innerHTML = "";
                    COLORS.forEach(c => {
                        const b = document.createElement('div');
                        b.style.height = '35px';
                        b.style.borderRadius = '6px';
                        b.style.background = c;
                        b.style.border = '3px solid transparent';
                        b.onclick = () => {
                            selectedColor = c;
                            [...cp.children].forEach(x => x.style.borderColor = 'transparent');
                            b.style.borderColor = '#333';
                        };
                        cp.appendChild(b);
                    });
                }
            }

            // リモコンをセットアップする関数
            function setupScrollRemote() {
                // 1. 二重生成防止
                if (document.getElementById('scroll-remote-control')) return;

                // 2. リモコン要素の作成
                const remote = document.createElement('div');
                remote.id = 'scroll-remote-control';
                remote.innerHTML = `
        <div class="remote-icon" id="remote-up">▲</div>
        <div class="remote-text">SCROLL</div>
        <div class="remote-icon" id="remote-down">▼</div>
    `;
                document.body.appendChild(remote);

                // 3. スクロール対象のコンテナ（IDを timeline-container に統一）
                const container = document.getElementById('timeline-container');
                let lastY = 0;

                // --- A: スライド操作（リモコンをなぞって動かす） ---
                remote.addEventListener('touchstart', (e) => {
                    lastY = e.touches[0].clientY;
                    remote.style.background = "rgba(0, 0, 0, 0.7)";
                    if (navigator.vibrate) navigator.vibrate(10);
                }, { passive: false });

                remote.addEventListener('touchmove', (e) => {
                    if (!container) return;
                    const currentY = e.touches[0].clientY;
                    const diff = lastY - currentY;

                    // 移動量を調整（なぞった分だけスルスル動く）
                    container.scrollTop += diff * 2.5;
                    lastY = currentY;
                    e.preventDefault();
                }, { passive: false });

                remote.addEventListener('touchend', () => {
                    remote.style.background = "rgba(0, 0, 0, 0.4)";
                    stopAutoScroll(); // Bの連打モードも止める
                });

                // --- B: ボタン操作（▲▼を押し続けて動かす） ---
                const upBtn = document.getElementById('remote-up');
                const downBtn = document.getElementById('remote-down');

                if (upBtn && downBtn) {
                    // 上ボタン
                    upBtn.addEventListener('touchstart', (e) => {
                        e.stopPropagation(); // スライド操作と混ざらないように
                        startAutoScroll(-15);
                    }, { passive: false });

                    // 下ボタン
                    downBtn.addEventListener('touchstart', (e) => {
                        e.stopPropagation();
                        startAutoScroll(15);
                    }, { passive: false });

                    // 離したら止める（PC用も含む）
                    [upBtn, downBtn].forEach(btn => {
                        btn.addEventListener('touchend', stopAutoScroll);
                        btn.addEventListener('mousedown', (e) => {
                            const speed = e.target.id === 'remote-up' ? -15 : 15;
                            startAutoScroll(speed);
                        });
                        btn.addEventListener('mouseup', stopAutoScroll);
                    });
                }
            }

            // init() の最後、または一番下の実行部分に追加してください
            setupScrollRemote();


            // 起動
            init();

            // PC用マウス監視
            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                handleAutoScroll(e.clientY);
                lastTouchY = e.clientY; // マウスのY座標を更新
                updateDragDisplay();    // 表示を更新
            });

            // マウスを離した時
            window.addEventListener('mouseup', () => {
                if (isDragging) {
                    stopAutoScroll();
                    stopDrag();
                }
            });

            // スマホ用タッチ監視
            window.addEventListener('touchmove', (e) => {
                if (!isDragging) return;
                const touch = e.touches[0];
                lastTouchY = touch.clientY;
                handleAutoScroll(lastTouchY); // 自動スクロール判定
                updateDragDisplay();
            }, { passive: false });

            // --- スマホ用：タッチ終了 ---
            window.addEventListener('touchend', () => {
                stopAutoScroll(); // リモコン停止用
                stopDrag();
            });


            // リモコンボタンの設定関数
            const setupRemoteBtn = (btn, speed) => {
                if (!btn) return;

                const startAction = (e) => {
                    e.preventDefault(); // 👈 これが超重要！ブラウザの標準挙動を殺します
                    e.stopPropagation(); // 👈 親要素への伝播を止めます
                    startAutoScroll(speed);
                };

                // スマホ用
                btn.addEventListener('touchstart', startAction, { passive: false });
                btn.addEventListener('touchend', stopAutoScroll, { passive: false });

                // PC用
                btn.addEventListener('mousedown', startAction);
                btn.addEventListener('mouseup', stopAutoScroll);
            };

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', setupScrollRemote);
            } else {
                setupScrollRemote();
            }

        </script>
</body>

</html>
